<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Human-Verify Professional Editor</title>
    <style>
        :root { --word-blue: #2b579a; --ribbon-bg: #f3f2f1; --border-color: #edebe9; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e6e6e6; display: flex; flex-direction: column; height: 100vh; }
        
        /* Quick Access Toolbar */
        .quick-access { background: var(--word-blue); color: white; padding: 5px 15px; display: flex; gap: 15px; font-size: 12px; align-items: center; }
        
        /* Ribbon Tabs */
        .tabs { background: var(--word-blue); display: flex; padding-left: 20px; gap: 5px; }
        .tab { padding: 8px 15px; color: white; cursor: pointer; font-size: 13px; border-radius: 4px 4px 0 0; }
        .tab.active { background: var(--ribbon-bg); color: #323130; }

        /* Ribbon Groups */
        .ribbon-content { background: var(--ribbon-bg); height: 90px; border-bottom: 1px solid var(--border-color); display: flex; padding: 5px 20px; align-items: center; gap: 20px; }
        .group { display: flex; flex-direction: column; align-items: center; border-right: 1px solid #d2d0ce; padding-right: 15px; height: 70px; justify-content: center; }
        .group-label { font-size: 11px; color: #605e5c; margin-top: 5px; }
        .controls { display: flex; gap: 5px; }
        .icon-btn { padding: 8px; border: 1px solid transparent; background: transparent; cursor: pointer; border-radius: 4px; }
        .icon-btn:hover { background: #edebe9; border-color: #d2d0ce; }

        /* The "Paper" Container */
        .workspace { flex-grow: 1; overflow-y: auto; display: flex; justify-content: center; padding: 40px; }
        .paper { background: white; width: 8.5in; min-height: 11in; padding: 1in; box-shadow: 0 0 10px rgba(0,0,0,0.2); box-sizing: border-box; }
        
        textarea { width: 100%; height: 100%; border: none; outline: none; font-family: 'Georgia', serif; font-size: 16px; line-height: 1.6; resize: none; }
        
        /* Status Bar */
        .status-bar { background: var(--word-blue); color: white; padding: 3px 20px; font-size: 12px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="quick-access">
    <span>💾</span> <span>↩️</span> <span>↪️</span>
    <span style="margin-left: 20px; font-weight: bold;">Human-Verify Pro</span>
</div>

<div class="tabs">
    <div class="tab active">Home</div>
    <div class="tab">Insert</div>
    <div class="tab">Review</div>
    <div class="tab" onclick="downloadJSON()" style="background: #107c10;">Export Data</div>
</div>

<div class="ribbon-content" id="home-ribbon">
    <div class="group">
        <div class="controls">
            <button class="icon-btn"><b>B</b></button>
            <button class="icon-btn"><i>I</i></button>
            <button class="icon-btn"><u>U</u></button>
        </div>
        <div class="group-label">Font</div>
    </div>
    <div class="group">
        <div class="controls">
            <button class="icon-btn">≡</button>
            <button class="icon-btn">≡</button>
        </div>
        <div class="group-label">Paragraph</div>
    </div>
    <div class="group" style="border: none;">
        <div class="controls">
            <button class="icon-btn" onclick="alert('Analysis feature coming soon!')">🔍 Verification Score</button>
        </div>
        <div class="group-label">Tools</div>
    </div>
</div>

<div class="workspace">
    <div class="paper">
        <textarea id="main-editor" placeholder="Start writing your human-verified masterpiece..."></textarea>
    </div>
</div>

<div class="status-bar">
    <div>Words: <span id="word-count">0</span></div>
    <div>Keystroke DNA Captured: <span id="key-count">0</span></div>
    <div>Session Status: <span style="color: #afffaf;">● Recording Live</span></div>
</div>

<script>
    let log = [];
    let startTime = null;
    let keyCount = 0;

    const editor = document.getElementById('main-editor');
    const keyDisplay = document.getElementById('key-count');
    const wordDisplay = document.getElementById('word-count');

    editor.addEventListener('keydown', (e) => {
        const now = Date.now();
        if (!startTime) startTime = now;

        // Recording the 'DNA'
        log.push({ k: e.key, t: now - startTime, type: 'dn' });
        
        keyCount++;
        keyDisplay.innerText = keyCount;

        // Word count update
        const words = editor.value.trim().split(/\s+/).length;
        wordDisplay.innerText = editor.value.trim() === "" ? 0 : words;
    });

    function downloadJSON() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(log));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "verification_log.json");
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    }
</script>

</body>
</html>
