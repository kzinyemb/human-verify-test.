<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Human-Verify | Final Build</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --word-blue: #2b579a; --ribbon-bg: #f3f2f1; --border-color: #d2d0ce; --hover-bg: #e1dfdd; --bg-workspace: #e6e6e6; --bg-paper: white; --text-main: #323130; --status-bar: var(--word-blue); }
        [data-theme="dark"] { --ribbon-bg: #2b2b2b; --border-color: #444; --hover-bg: #3c3c3c; --bg-workspace: #1e1e1e; --bg-paper: #2d2d2d; --text-main: #ffffff; --status-bar: #1a1a1a; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-workspace); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .quick-access { background: var(--word-blue); color: white; padding: 5px 15px; display: flex; gap: 10px; font-size: 14px; align-items: center; z-index: 100; }
        .score-pill { background: #107c10; padding: 2px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; }
        .tabs { background: var(--word-blue); display: flex; padding-left: 10px; position: relative; z-index: 50; }
        .tab { padding: 8px 18px; color: white; cursor: pointer; font-size: 13px; border-radius: 4px 4px 0 0; }
        .tab.active { background: var(--ribbon-bg); color: var(--text-main); }
        .tab-file { background: #1e3e6d; font-weight: bold; margin-right: 2px; }
        .ribbon-content { background: var(--ribbon-bg); height: 115px; border-bottom: 1px solid var(--border-color); display: none; padding: 0 20px; align-items: center; gap: 10px; width: 100%; box-sizing: border-box; }
        .ribbon-content.active { display: flex; }
        .group { display: flex; flex-direction: column; align-items: center; border-right: 1px solid var(--border-color); padding: 0 12px; height: 85%; justify-content: center; }
        .btn-row { display: flex; flex-direction: row; gap: 5px; align-items: center; }
        .group-label { font-size: 10px; color: #888; margin-top: auto; padding-bottom: 2px; text-transform: uppercase; }
        .btn { padding: 5px 8px; border: 1px solid transparent; background: transparent; cursor: pointer; border-radius: 3px; font-size: 14px; color: var(--text-main); display: flex; align-items: center; gap: 5px; }
        .btn:hover { background: var(--hover-bg); border-color: var(--border-color); }
        .btn-big { flex-direction: column; font-size: 11px; padding: 8px 12px; text-align: center; min-width: 65px; }
        .btn-big span { font-size: 22px; margin-bottom: 2px; }
        select { padding: 3px; font-size: 12px; border: 1px solid var(--border-color); background: var(--bg-paper); color: var(--text-main); }
        .workspace { flex-grow: 1; overflow: auto; display: flex; justify-content: center; padding: 30px; position: relative; }
        .paper { background: var(--bg-paper); color: var(--text-main); width: 8.5in; min-height: 11in; padding: 1in; box-shadow: 0 0 15px rgba(0,0,0,0.2); outline: none; line-height: 1.5; font-family: 'Calibri', sans-serif; }
        #data-view-container { display: none; width: 85%; background: var(--bg-paper); padding: 30px; border-radius: 8px; }
        .status-bar { background: var(--status-bar); color: white; padding: 4px 20px; font-size: 11px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="quick-access">
    <div onclick="autoSave()" style="cursor:pointer">💾</div>
    <div onclick="toggleTheme()" style="cursor:pointer">🌙</div>
    <div class="score-pill">Verification: <span id="trust-score">0%</span></div>
    <span id="doc-name" style="margin-left:auto; font-weight:bold; font-size:12px;">Untitled Document</span>
</div>

<div class="tabs">
    <div class="tab tab-file" onclick="setView('file')">File</div>
    <div class="tab active" id="tab-home" onclick="setView('home')">Home</div>
    <div class="tab" id="tab-insert" onclick="setView('insert')">Insert</div>
    <div class="tab" id="tab-data" onclick="setView('data')" style="background:#107c10">Analytics</div>
</div>

<div class="ribbon-content" id="file-ribbon">
    <div class="group">
        <div class="btn-row">
            <button class="btn btn-big" onclick="newDoc()"><span>📄</span>New</button>
            <button class="btn btn-big" onclick="window.print()"><span>🖨️</span>Print</button>
            <button class="btn btn-big" onclick="exportPDF()"><span>📕</span>PDF</button>
        </div>
        <div class="group-label">Document</div>
    </div>
</div>

<div class="ribbon-content active" id="home-ribbon">
    <div class="group">
        <select onchange="execCmd('fontName', this.value)">
            <option value="Calibri">Calibri</option>
            <option value="Arial">Arial</option>
            <option value="Times New Roman">Times New Roman</option>
        </select>
        <div class="btn-row">
            <button class="btn" onclick="execCmd('bold')">B</button>
            <button class="btn" onclick="execCmd('superscript')">x²</button>
            <button class="btn" onclick="execCmd('subscript')">x₂</button>
        </div>
        <div class="group-label">Font</div>
    </div>
    <div class="group">
        <div class="btn-row">
            <button class="btn" onclick="execCmd('insertUnorderedList')">•—</button>
            <button class="btn" onclick="execCmd('insertOrderedList')">1—</button>
        </div>
        <div class="group-label">Paragraph</div>
    </div>
</div>

<div class="ribbon-content" id="insert-ribbon">
    <div class="group">
        <div class="btn-row">
            <button class="btn btn-big" onclick="insertTable()"><span>📅</span>Table</button>
            <button class="btn btn-big" onclick="insertLink()"><span>🔗</span>Link</button>
        </div>
        <div class="group-label">Content</div>
    </div>
</div>

<div class="workspace">
    <div id="word-view" class="paper" contenteditable="true" oninput="handleInput()">Start typing...</div>
    <div id="data-view-container">
        <canvas id="wpmChart" height="150"></canvas>
    </div>
</div>

<div class="status-bar">
    <div>Words: <span id="word-count">0</span> | Keystrokes: <span id="key-count">0</span></div>
    <div id="save-status">Ready</div>
</div>

<script>
    let log = [], startTime = null, wpmData = [], chartInstance = null;
    const editor = document.getElementById('word-view');

    // Snapshot speed every 5 seconds for faster testing
    setInterval(() => {
        if (startTime && editor.style.display !== 'none') {
            const text = editor.innerText.trim();
            const words = text === "" ? 0 : text.split(/\s+/).length;
            const mins = (Date.now() - startTime) / 60000;
            const wpm = Math.round(words / (mins || 0.01));
            wpmData.push(wpm);
            if(wpmData.length > 20) wpmData.shift();
        }
    }, 5000);

    function updateChart() {
        const ctx = document.getElementById('wpmChart').getContext('2d');
        if(chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: wpmData.map((_, i) => i * 5 + 's'),
                datasets: [{ label: 'WPM', data: wpmData, borderColor: '#107c10', fill: true }]
            },
            options: { responsive: true, scales: { y: { beginAtZero: true } } }
        });
    }

    function setView(id) {
        document.querySelectorAll('.ribbon-content').forEach(r => r.style.display = 'none');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        if(id === 'data') {
            editor.style.display = 'none';
            document.getElementById('data-view-container').style.display = 'block';
            document.getElementById('tab-data').classList.add('active');
            updateChart();
        } else {
            editor.style.display = 'block';
            document.getElementById('data-view-container').style.display = 'none';
            document.getElementById(id + '-ribbon').style.display = 'flex';
            if(id !== 'file') document.getElementById('tab-' + id).classList.add('active');
        }
    }

    function execCmd(c, v=null) { document.execCommand(c, false, v); handleInput(); }
    function handleInput() {
        const t = editor.innerText.trim();
        document.getElementById('word-count').innerText = t === "" ? 0 : t.split(/\s+/).length;
        document.getElementById('key-count').innerText = log.length;
        localStorage.setItem('hv_content', editor.innerHTML);
        calculateTrustScore();
    }

    function calculateTrustScore() {
        let b = log.filter(e => e.k === "Backspace").length;
        let k = log.length;
        if (k < 5) return;
        document.getElementById('trust-score').innerText = Math.min(100, Math.floor((b/k*200)+(k/10))) + "%";
    }

    editor.addEventListener('keydown', (e) => {
        if (!startTime) startTime = Date.now();
        log.push({ k: e.key, t: Date.now() - startTime });
    });

    function newDoc() { editor.innerHTML = ""; log = []; startTime = null; wpmData = []; }
    function exportPDF() { html2pdf().from(editor).save('Document.pdf'); }
    function insertTable() { document.execCommand('insertHTML', false, '<table border="1" style="width:100%"><tr><td>-</td><td>-</td></tr></table>'); }
    function insertLink() { let u = prompt("URL:"); if(u) document.execCommand('createLink', false, u); }
    function toggleTheme() { document.body.toggleAttribute('data-theme'); }
    function autoSave() { alert("Saved to local storage."); }
</script>
</body>
</html>
