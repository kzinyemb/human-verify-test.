<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Human-Verify | Enterprise Suite</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --word-blue: #2b579a; --ribbon-bg: #f3f2f1; --border-color: #d2d0ce; --hover-bg: #e1dfdd; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #e6e6e6; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Quick Access Toolbar */
        .quick-access { background: var(--word-blue); color: white; padding: 5px 15px; display: flex; gap: 5px; font-size: 14px; align-items: center; }
        .qa-btn { cursor: pointer; padding: 4px 8px; border-radius: 3px; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .qa-btn:hover { background: rgba(255,255,255,0.2); }
        .qa-btn:active { background: rgba(255,255,255,0.4); transform: translateY(1px); }
        
        .doc-title { margin-left: 15px; font-weight: bold; cursor: pointer; padding: 2px 8px; border-radius: 3px; font-size: 12px; }
        .doc-title:hover { background: rgba(255,255,255,0.2); }

        .tabs { background: var(--word-blue); display: flex; padding-left: 10px; }
        .tab { padding: 8px 18px; color: white; cursor: pointer; font-size: 13px; }
        .tab.active { background: var(--ribbon-bg); color: #323130; border-radius: 4px 4px 0 0; }
        .tab-file { background: #1e3e6d; font-weight: bold; }

        /* Ribbon Styles */
        .ribbon-content { background: var(--ribbon-bg); height: 110px; border-bottom: 1px solid var(--border-color); display: none; padding: 0 20px; align-items: center; gap: 10px; }
        .ribbon-content.active { display: flex; }
        .group { display: flex; flex-direction: column; align-items: center; border-right: 1px solid #d2d0ce; padding: 0 12px; height: 85%; justify-content: center; }
        .group-label { font-size: 10px; color: #605e5c; margin-top: auto; padding-bottom: 2px; text-transform: uppercase; }
        
        .btn { padding: 5px 8px; border: 1px solid transparent; background: transparent; cursor: pointer; border-radius: 3px; font-size: 14px; display: flex; align-items: center; gap: 5px; }
        .btn:hover { background: var(--hover-bg); border-color: #c8c6c4; }
        .btn-big { flex-direction: column; font-size: 11px; padding: 10px; }
        .btn-big span { font-size: 20px; }

        select { padding: 3px; font-size: 12px; border: 1px solid var(--border-color); background: white; }

        /* Workspace */
        .workspace { flex-grow: 1; overflow: auto; display: flex; justify-content: center; padding: 30px; }
        .paper { background: white; width: 8.5in; min-height: 11in; padding: 1in; box-shadow: 0 0 15px rgba(0,0,0,0.1); outline: none; line-height: 1.5; font-family: 'Calibri', sans-serif; }
        
        /* Status Bar */
        .status-bar { background: var(--word-blue); color: white; padding: 4px 20px; font-size: 11px; display: flex; justify-content: space-between; }
        .autosave-tag { color: #afffaf; font-weight: bold; }
    </style>
</head>
<body>

<!-- Quick Access Toolbar -->
<div class="quick-access">
    <div class="qa-btn" title="Save Now" onclick="forceSave()">💾</div>
    <div class="qa-btn" title="Undo" onclick="execCmd('undo')">↩️</div>
    <div class="qa-btn" title="Redo" onclick="execCmd('redo')">↪️</div>
    <div class="qa-btn" title="Print" onclick="window.print()">🖨️</div>
    <span class="doc-title" id="doc-name" onclick="renameDoc()">Document 1 - Human Verified</span>
</div>

<div class="tabs">
    <div class="tab tab-file" onclick="setView('word', 'file')">File</div>
    <div class="tab active" id="tab-home" onclick="setView('word', 'home')">Home</div>
    <div class="tab" id="tab-data" onclick="setView('sheets', 'data')" style="background: #107c10;">Data View</div>
</div>

<!-- FILE RIBBON -->
<div class="ribbon-content" id="file-ribbon">
    <div class="group">
        <div style="display:flex; gap:5px;">
            <button class="btn btn-big" onclick="newDoc()"><span>📄</span>New</button>
            <button class="btn btn-big" onclick="exportPDF()"><span>📕</span>Export PDF</button>
        </div>
        <div class="group-label">Common</div>
    </div>
    <div class="group">
        <button class="btn" onclick="downloadJSON()">📑 Download JSON Audit</button>
        <button class="btn" onclick="renameDoc()">✏️ Rename Document</button>
        <div class="group-label">Storage</div>
    </div>
</div>

<!-- HOME RIBBON -->
<div class="ribbon-content active" id="home-ribbon">
    <div class="group">
        <div style="display:flex; gap:4px; margin-bottom:5px;">
            <select style="width:120px" onchange="execCmd('fontName', this.value)">
                <option value="Calibri">Calibri</option>
                <option value="Calibri Light">Calibri Light</option>
                <option value="Times New Roman">Times New Roman</option>
                <option value="Arial">Arial</option>
            </select>
            <select onchange="execCmd('fontSize', this.value)">
                <option value="3">11</option>
                <option value="4">12</option>
                <option value="5">14</option>
                <option value="6">18</option>
            </select>
        </div>
        <div style="display:flex; gap:4px;">
            <button class="btn" onclick="execCmd('bold')"><b>B</b></button>
            <button class="btn" onclick="execCmd('italic')"><i>I</i></button>
            <button class="btn" onclick="execCmd('underline')"><u>U</u></button>
            <button class="btn" onclick="execCmd('superscript')" title="Superscript">X<sup>2</sup></button>
            <button class="btn" onclick="execCmd('subscript')" title="Subscript">X<sub>2</sub></button>
        </div>
        <div class="group-label">Font</div>
    </div>
    <div class="group">
        <div style="display:flex; gap:4px; margin-bottom:5px;">
            <button class="btn" onclick="execCmd('insertUnorderedList')">•—</button>
            <button class="btn" onclick="execCmd('insertOrderedList')">1.—</button>
            <select onchange="setLineHeight(this.value)">
                <option value="1.0">1.0</option>
                <option value="1.5" selected>1.5</option>
                <option value="2.0">2.0</option>
            </select>
        </div>
        <div style="display:flex; gap:4px;">
            <button class="btn" onclick="execCmd('justifyLeft')">≡</button>
            <button class="btn" onclick="execCmd('justifyCenter')">≣</button>
            <button class="btn" onclick="execCmd('justifyRight')">≡</button>
        </div>
        <div class="group-label">Paragraph</div>
    </div>
</div>

<div class="workspace">
    <div id="word-view" class="paper" contenteditable="true" oninput="handleInput()">
        Start your verified draft here...
    </div>
</div>

<div class="status-bar">
    <div>Words: <span id="word-count">0</span></div>
    <div>Keystroke Log: <span id="key-count">0</span> events</div>
    <div id="save-status" class="autosave-tag">Synced</div>
</div>

<script>
    let log = [];
    let startTime = null;
    const editor = document.getElementById('word-view');

    // INITIALIZE & LOAD
    window.onload = () => {
        const savedText = localStorage.getItem('hv_content');
        const savedLog = localStorage.getItem('hv_log');
        const savedName = localStorage.getItem('hv_doc_name');

        if (savedText) editor.innerHTML = savedText;
        if (savedLog) log = JSON.parse(savedLog);
        if (savedName) document.getElementById('doc-name').innerText = savedName;
        
        updateStats();
    };

    function handleInput() {
        updateStats();
        autoSave();
    }

    function autoSave() {
        localStorage.setItem('hv_content', editor.innerHTML);
        localStorage.setItem('hv_log', JSON.stringify(log));
        localStorage.setItem('hv_doc_name', document.getElementById('doc-name').innerText);
        
        document.getElementById('save-status').innerText = "Saved";
        setTimeout(() => {
            document.getElementById('save-status').innerText = "Auto-synced";
        }, 1000);
    }

    function forceSave() {
        autoSave();
        alert("Document and Keystroke DNA successfully committed to local storage.");
    }

    function exportPDF() {
        const element = document.getElementById('word-view');
        const fileName = document.getElementById('doc-name').innerText + ".pdf";
        const opt = {
            margin: 1,
            filename: fileName,
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
        log.push({ action: 'export', type: 'pdf', t: Date.now() - (startTime || Date.now()) });
    }

    function execCmd(command, value = null) {
        document.execCommand(command, false, value);
        if (!startTime) startTime = Date.now();
        log.push({ action: 'format', cmd: command, val: value, t: Date.now() - startTime });
        autoSave();
    }

    function setLineHeight(val) {
        editor.style.lineHeight = val;
        log.push({ action: 'spacing', val: val, t: Date.now() - (startTime || Date.now()) });
        autoSave();
    }

    function setView(viewMode, ribbonId) {
        document.querySelectorAll('.ribbon-content').forEach(r => r.classList.remove('active'));
        document.getElementById(ribbonId + '-ribbon').classList.add('active');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        if(ribbonId !== 'file') document.getElementById('tab-' + ribbonId).classList.add('active');
    }

    function newDoc() {
        if(confirm("Create new document? This clears all current history.")) {
            editor.innerHTML = "";
            log = [];
            startTime = null;
            localStorage.clear();
            updateStats();
        }
    }

    function renameDoc() {
        const newName = prompt("Document Name:", document.getElementById('doc-name').innerText);
        if(newName) {
            document.getElementById('doc-name').innerText = newName;
            autoSave();
        }
    }

    editor.addEventListener('keydown', (e) => {
        if (!startTime) startTime = Date.now();
        log.push({ k: e.key, t: Date.now() - startTime, type: 'keystroke' });
    });

    function updateStats() {
        document.getElementById('key-count').innerText = log.length;
        const text = editor.innerText.trim();
        const words = text === "" ? 0 : text.split(/\s+/).length;
        document.getElementById('word-count').innerText = words;
    }

    function downloadJSON() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(log));
        const downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", "audit_log.json");
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
    }
</script>

</body>
</html>
