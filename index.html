<style>
    /* Fixed Tab/Ribbon spacing to prevent overlap */
    .tabs { 
        background: var(--word-blue); 
        display: flex; 
        padding-left: 10px; 
        position: relative;
        z-index: 10; /* Ensures tabs stay above ribbon shadows */
    }
    
    /* Ensure ribbons are strictly contained */
    .ribbon-content { 
        background: var(--ribbon-bg); 
        height: 115px; 
        border-bottom: 1px solid var(--border-color); 
        display: none; 
        padding: 0 20px; 
        align-items: center; 
        gap: 10px;
        width: 100%;
        box-sizing: border-box;
    }
</style>

<script>
    // ... (Keep your other variables the same)

    function setView(id) {
        // 1. Hide ALL ribbons first
        document.querySelectorAll('.ribbon-content').forEach(r => {
            r.classList.remove('active');
            r.style.display = 'none';
        });

        // 2. Remove active state from ALL tabs
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

        // 3. Handle Data View vs Ribbon Views
        if(id === 'data') {
            document.getElementById('word-view').style.display = 'none';
            document.getElementById('data-view-container').style.display = 'block';
            document.getElementById('tab-data').classList.add('active');
        } else {
            document.getElementById('word-view').style.display = 'block';
            document.getElementById('data-view-container').style.display = 'none';
            
            // Show the specific ribbon and its tab
            const targetRibbon = document.getElementById(id + '-ribbon');
            targetRibbon.classList.add('active');
            targetRibbon.style.display = 'flex'; // Force flex display
            
            // The "File" button doesn't get a 'Home' style active state, 
            // but the other tabs do.
            if(id !== 'file') {
                const targetTab = document.getElementById('tab-' + id);
                if(targetTab) targetTab.classList.add('active');
            }
        }
    }
</script>
