<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Human-Verify | Analytics Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --word-blue: #2b579a; --ribbon-bg: #f3f2f1; --border-color: #d2d0ce; 
            --hover-bg: #e1dfdd; --bg-workspace: #e6e6e6; --bg-paper: white;
            --text-main: #323130; --status-bar: var(--word-blue);
        }

        [data-theme="dark"] {
            --ribbon-bg: #2b2b2b; --border-color: #444; --hover-bg: #3c3c3c;
            --bg-workspace: #1e1e1e; --bg-paper: #2d2d2d; --text-main: #ffffff;
            --status-bar: #1a1a1a;
        }

        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-workspace); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Quick Access */
        .quick-access { background: var(--word-blue); color: white; padding: 5px 15px; display: flex; gap: 10px; font-size: 14px; align-items: center; }
        .qa-btn { cursor: pointer; padding: 4px 8px; border-radius: 3px; transition: 0.2s; }
        .qa-btn:hover { background: rgba(255,255,255,0.2); }
        .score-pill { background: #107c10; padding: 2px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; }

        .tabs { background: var(--word-blue); display: flex; padding-left: 10px; }
        .tab { padding: 8px 18px; color: white; cursor: pointer; font-size: 13px; }
        .tab.active { background: var(--ribbon-bg); color: var(--text-main); border-radius: 4px 4px 0 0; }
        .tab-file { background: #1e3e6d; font-weight: bold; }

        /* Ribbon */
        .ribbon-content { background: var(--ribbon-bg); height: 115px; border-bottom: 1px solid var(--border-color); display: none; padding: 0 20px; align-items: center; gap: 10px; }
        .ribbon-content.active { display: flex; }
        .group { display: flex; flex-direction: column; align-items: center; border-right: 1px solid var(--border-color); padding: 0 12px; height: 85%; justify-content: center; }
        .group-label { font-size: 10px; color: #888; margin-top: auto; padding-bottom: 2px; text-transform: uppercase; }
        
        .btn { padding: 5px 8px; border: 1px solid transparent; background: transparent; cursor: pointer; border-radius: 3px; font-size: 14px; color: var(--text-main); display: flex; align-items: center; gap: 5px; }
        .btn:hover { background: var(--hover-bg); border-color: var(--border-color); }
        .btn-big { flex-direction: column; font-size: 11px; padding: 8px 12px; text-align: center; }
        .btn-big span { font-size: 22px; margin-bottom: 2px; }

        select { padding: 3px; font-size: 12px; border: 1px solid var(--border-color); background: var(--bg-paper); color: var(--text-main); }

        .workspace { flex-grow: 1; overflow: auto; display: flex; justify-content: center; padding: 30px; }
        .paper { 
            background: var(--bg-paper); color: var(--text-main); width: 8.5in; min-height: 11in; 
            padding: 1in; box-shadow: 0 0 15px rgba(0,0,0,0.2); outline: none; line-height: 1.5; 
            font-family: 'Calibri', sans-serif; transition: background 0.3s;
        }
        
        #data-view-container { display: none; width: 80%; background: var(--bg-paper); padding: 20px; border-radius: 8px; }
        .status-bar { background: var(--status-bar); color: white; padding: 4px 20px; font-size: 11px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="quick-access">
    <div class="qa-btn" onclick="forceSave()">💾</div>
    <div class="qa-btn" onclick="execCmd('undo')">↩️</div>
    <div class="qa-btn" onclick="execCmd('redo')">↪️</div>
    <div class="qa-btn" onclick="toggleTheme()" id="theme-icon">🌙</div>
    <div class="score-pill">Verification: <span id="trust-score">0%</span></div>
    <span id="doc-name" style="margin-left:auto; font-weight:bold; font-size:12px; cursor:pointer;" onclick="renameDoc()">Untitled Document</span>
</div>

<div class="tabs">
    <div class="tab tab-file" onclick="setView('file')">File</div>
    <div class="tab active" id="tab-home" onclick="setView('home')">Home</div>
    <div class="tab" id="tab-insert" onclick="setView('insert')">Insert</div>
    <div class="tab" id="tab-data" onclick="setView('data')" style="background:#107c10">Analytics</div>
</div>

<!-- FILE RIBBON -->
<div class="ribbon-content" id="file-ribbon">
    <div class="group">
        <button class="btn btn-big" onclick="newDoc()"><span>📄</span>New</button>
        <button class="btn btn-big" onclick="createCopy()"><span>👯</span>Copy</button>
        <div class="group-label">Document</div>
    </div>
    <div class="group">
        <button class="btn btn-big" onclick="window.print()"><span>🖨️</span>Print</button>
        <button class="btn btn-big" onclick="renameDoc()"><span>✏️</span>Rename</button>
        <button class="btn btn-big" onclick="deleteDoc()" style="color: #d83b01;"><span>🗑️</span>Delete</button>
        <div class="group-label">Manage</div>
    </div>
    <div class="group">
        <button class="btn btn-big" onclick="exportPDF()"><span>📕</span>PDF</button>
        <div class="group-label">Export</div>
    </div>
</div>

<!-- HOME RIBBON -->
<div class="ribbon-content active" id="home-ribbon">
    <div class="group">
        <div style="display:flex; gap:4px; margin-bottom:5px;">
            <select onchange="execCmd('fontName', this.value)">
                <option value="Calibri">Calibri</option>
                <option value="Calibri Light">Calibri Light</option>
                <option value="Times New Roman">Times New Roman</option>
                <option value="Arial">Arial</option>
            </select>
            <select onchange="execCmd('fontSize', this.value)">
                <option value="3">11</option><option value="4">12</option><option value="5">14</option>
            </select>
        </div>
        <div style="display:flex; gap:4px;">
            <button class="btn" onclick="execCmd('bold')"><b>B</b></button>
            <button class="btn" onclick="execCmd('italic')"><i>I</i></button>
            <button class="btn" onclick="execCmd('underline')"><u>U</u></button>
            <button class="btn" onclick="execCmd('superscript')">x²</button>
            <button class="btn" onclick="execCmd('subscript')">x₂</button>
        </div>
        <div class="group-label">Font</div>
    </div>
    <div class="group">
        <div style="display:flex; gap:4px; margin-bottom:5px;">
            <button class="btn" onclick="execCmd('insertUnorderedList')">•—</button>
            <button class="btn" onclick="execCmd('insertOrderedList')">1—</button>
        </div>
        <div style="display:flex; gap:4px;">
            <button class="btn" onclick="execCmd('justifyLeft')">≡</button>
            <button class="btn" onclick="execCmd('justifyCenter')">≣</button>
            <button class="btn" onclick="execCmd('justifyRight')">≡</button>
        </div>
        <div class="group-label">Paragraph</div>
    </div>
</div>

<!-- INSERT RIBBON -->
<div class="ribbon-content" id="insert-ribbon">
    <div class="group">
        <button class="btn btn-big" onclick="insertTable()"><span>📅</span>Table</button>
        <button class="btn btn-big" onclick="insertLink()"><span>🔗</span>Link</button>
        <div class="group-label">Content</div>
    </div>
</div>

<div class="workspace">
    <div id="word-view" class="paper" contenteditable="true" oninput="handleInput()"></div>
    <div id="data-view-container">
        <h3>Typing Velocity</h3>
        <canvas id="wpmChart" height="100"></canvas>
    </div>
</div>

<div class="status-bar">
    <div>Words: <span id="word-count">0</span></div>
    <div>Keystroke Events: <span id="key-count">0</span></div>
    <div id="save-status">Synced</div>
</div>

<script>
    let log = [];
    let startTime = null;
    let wpmData = [];
    let chartInstance = null;
    const editor = document.getElementById('word-view');

    window.onload = () => {
        if(localStorage.getItem('theme') === 'dark') document.body.setAttribute('data-theme', 'dark');
        const savedText = localStorage.getItem('hv_content');
        if (savedText) editor.innerHTML = savedText;
        updateStats();
    };

    function execCmd(c, v=null) { 
        document.execCommand(c, false, v); 
        logAction('format', c);
        autoSave();
    }

    function logAction(action, val = null) {
        if (!startTime) startTime = Date.now();
        log.push({ action: action, value: val, t: Date.now() - startTime });
    }

    function handleInput() { updateStats(); autoSave(); calculateTrustScore(); }

    function autoSave() {
        localStorage.setItem('hv_content', editor.innerHTML);
        document.getElementById('save-status').innerText = "Saved";
        setTimeout(() => document.getElementById('save-status').innerText = "Synced", 1000);
    }

    function calculateTrustScore() {
        let backspaces = log.filter(entry => entry.k === "Backspace").length;
        let keystrokes = log.filter(entry => entry.type === "keystroke").length;
        if (keystrokes < 20) return;
        let score = Math.min(100, Math.floor((backspaces / keystrokes * 200) + (keystrokes / 10)));
        document.getElementById('trust-score').innerText = score + "%";
    }

    function setView(id) {
        document.querySelectorAll('.ribbon-content').forEach(r => r.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        if(id === 'data') {
            document.getElementById('word-view').style.display = 'none';
            document.getElementById('data-view-container').style.display = 'block';
            document.getElementById('tab-data').classList.add('active');
        } else {
            document.getElementById('word-view').style.display = 'block';
            document.getElementById('data-view-container').style.display = 'none';
            document.getElementById(id + '-ribbon').classList.add('active');
            if(id !== 'file') document.getElementById('tab-' + id).classList.add('active');
        }
    }

    function newDoc() { if(confirm("Clear document?")) { editor.innerHTML = ""; log = []; location.reload(); } }
    
    function createCopy() {
        const blob = new Blob([editor.innerHTML], {type: "text/html"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = document.getElementById('doc-name').innerText + "_Copy.html";
        a.click();
    }

    function renameDoc() {
        const n = prompt("Rename to:", document.getElementById('doc-name').innerText);
        if(n) document.getElementById('doc-name').innerText = n;
    }

    function deleteDoc() { if(confirm("Delete everything?")) { localStorage.clear(); location.reload(); } }

    editor.addEventListener('keydown', (e) => {
        if (!startTime) startTime = Date.now();
        log.push({ k: e.key, t: Date.now() - startTime, type: 'keystroke' });
    });

    function updateStats() {
        const text = editor.innerText.trim();
        document.getElementById('word-count').innerText = text === "" ? 0 : text.split(/\s+/).length;
        document.getElementById('key-count').innerText = log.length;
    }

    function toggleTheme() {
        document.body.toggleAttribute('data-theme');
        localStorage.setItem('theme', document.body.hasAttribute('data-theme') ? 'dark' : 'light');
    }
    
    function forceSave() { autoSave(); alert("Hard Save Completed."); }
    function exportPDF() { html2pdf().from(editor).save('HumanVerified.pdf'); }
</script>
</body>
</html>
