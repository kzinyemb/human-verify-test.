<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Human-Verify | Recorder v1.0</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8fafc; padding: 40px; line-height: 1.6; }
        .editor-container { max-width: 900px; margin: auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        h1 { margin-top: 0; color: #1e293b; font-size: 24px; }
        textarea { width: 100%; height: 400px; padding: 20px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; font-family: "Georgia", serif; outline: none; transition: border-color 0.2s; resize: none; box-sizing: border-box; }
        textarea:focus { border-color: #3b82f6; }
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
        .stats { font-size: 14px; color: #64748b; }
        .btn { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; transition: background 0.2s; }
        .btn:hover { background: #2563eb; }
        .btn-download { background: #10b981; margin-left: 10px; }
        .btn-download:hover { background: #059669; }
    </style>
</head>
<body>
<div class="editor-container">
    <h1>Human-Verify Recorder</h1>
    <p>Type your draft here. Every stroke is being logged for authenticity verification.</p>
    <textarea id="main-editor" placeholder="Start typing..."></textarea>
    <div class="toolbar">
        <div class="stats">
            Keystrokes: <span id="key-count">0</span> | 
            Active Time: <span id="time-count">0</span>s
        </div>
        <div>
            <button class="btn btn-download" onclick="downloadJSON()">Download JSON Log</button>
        </div>
    </div>
</div>
<script>
    let log = []; let startTime = null; let keyCount = 0; let lastEventTime = null; let totalActiveSeconds = 0;
    const editor = document.getElementById('main-editor');
    const keyDisplay = document.getElementById('key-count');
    const timeDisplay = document.getElementById('time-count');
    editor.addEventListener('keydown', (e) => {
        const now = Date.now();
        if (!startTime) startTime = now;
        log.push({ k: e.key, t: now - startTime, type: 'dn' });
        if (lastEventTime && (now - lastEventTime < 3000)) { totalActiveSeconds += (now - lastEventTime) / 1000; }
        lastEventTime = now;
        keyCount++; keyDisplay.innerText = keyCount; timeDisplay.innerText = Math.round(totalActiveSeconds);
    });
    function downloadJSON() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(log));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "writing_log.json");
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click(); downloadAnchorNode.remove();
    }
</script>
</body>
</html>
